<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presença Diária</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* RESET & SISTEMA DE CORES PREMIUM DINÂMICO */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            /* TEMA PADRÃO (CLARO ORGÂNICO) */
            --bg-externo: #f4eee1; 
            --bg-principal: #fbf8f2; 
            --bg-card: #ffffff; 
            --bg-card-escuro: #1d3326; 
            --borda: #ece3d3; 
            --verde-marca: #2e4d3a; 
            --texto-puro: #1c2421; 
            --texto-mutado: #78827c; 
            --texto-reverso: #ffffff; 
            --transicao-suave: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* TEMA ESCURO (VERDE PROFUNDO DO PRINT) */
        body.tema-escuro {
            --bg-externo: #132219; /* Fundo externo ainda mais profundo */
            --bg-principal: #1a2e22; /* O verde exato do seu print */
            --bg-card: #233d2e; /* Cards levemente mais claros que o fundo para dar contraste */
            --bg-card-escuro: #132219; 
            --borda: #2a4736; 
            --verde-marca: #6da080; /* Tom verde mais claro para botões e detalhes contrastarem no escuro */
            --texto-puro: #f3f7f4; /* Texto claro confortável para leitura no escuro */
            --texto-mutado: #92a499; 
            --texto-reverso: #ffffff;
        }

        html, body { 
            width: 100%; 
            height: 100%; 
            background: var(--bg-externo); 
            overflow: hidden; 
            transition: background 0.3s ease;
        }

        body { 
            color: var(--texto-puro); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* CONTAINER RESPONSIVO */
        .container { 
            width: 100%; 
            max-width: 430px; 
            height: 100%;
            max-height: 92vh; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-principal); 
            margin: 0 auto; 
            border-radius: 0px; 
            box-shadow: 0 30px 70px rgba(28,36,33,0.08);
            transition: var(--transicao-suave);
            overflow: hidden;
        }

        @media (max-width: 480px) {
            body { align-items: flex-start; background: var(--bg-principal); }
            .container { 
                max-width: 100%; 
                max-height: 100vh;
                height: 100vh;
                border-radius: 0;
                box-shadow: none; 
            }
        }

        /* VISÕES E TRANSIÇÕES */
        .view { 
            display: none; 
            padding: 24px 24px 80px 24px; 
            flex: 1; 
            opacity: 0; 
            transform: translateY(12px);
            will-change: transform, opacity;
            transition: opacity 0.4s cubic-bezier(0.215, 0.610, 0.355, 1), 
                        transform 0.4s cubic-bezier(0.215, 0.610, 0.355, 1);
            flex-direction: column;
            overflow-y: auto; 
        }
        .view.active { 
            display: flex; 
            flex-direction: column; 
            opacity: 1; 
            transform: translateY(0);
        }

        #view-home {
            overflow-y: hidden; 
        }

        #view-read.view { padding: 0 0 80px 0; }
        .conteudo-leitura-padding { padding: 24px; display: flex; flex-direction: column; flex: 1; position: relative; }

        /* CUSTOMIZAÇÃO DE SCROLL BAR */
        #container-lista::-webkit-scrollbar,
        .view::-webkit-scrollbar {
            width: 4px;
        }
        #container-lista::-webkit-scrollbar-track,
        .view::-webkit-scrollbar-track {
            background: var(--bg-principal);
        }
        #container-lista::-webkit-scrollbar-thumb,
        .view::-webkit-scrollbar-thumb {
            background: var(--verde-marca);
            border-radius: 0px;
        }

        /* HEADER & TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .btn-icon {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: var(--texto-puro);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transicao-suave);
        }
        .btn-icon:active { transform: scale(0.9); }

        /* SIDEBAR MENU LATERAL */
        .sidebar {
            position: absolute;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: var(--bg-card);
            border-right: 1px solid var(--borda);
            box-shadow: 4px 0 35px rgba(28,36,33,0.08);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            transition: left 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--verde-marca);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }
        .btn-close-sidebar {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--texto-mutado);
            cursor: pointer;
        }
        .sidebar-content {
            padding: 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-link {
            background: none;
            border: none;
            text-align: left;
            padding: 14px 20px;
            font-size: 0.9rem;
            color: var(--texto-puro);
            cursor: pointer;
            font-weight: 600;
            border-left: 0px solid var(--verde-marca);
            transition: all 0.2s ease;
        }
        .sidebar-link:hover {
            background-color: rgba(46, 77, 58, 0.04);
            border-left: 4px solid var(--verde-marca);
            padding-left: 24px;
        }
        .sidebar-divider {
            height: 1px;
            background-color: var(--borda);
            margin: 12px 20px;
        }

        /* SAUDAÇÃO ATUALIZADA */
        .saudacao-box { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; flex-shrink: 0; }
        .saudacao-texto { font-size: 1.6rem; font-weight: 700; color: var(--texto-puro); letter-spacing: -0.5px; }
        .saudacao-sub { font-size: 0.85rem; color: var(--texto-mutado); line-height: 1.4; }

        /* CARD CAPA DINÂMICO */
        .card-capa-dia { 
            position: relative; 
            width: 100%; 
            height: clamp(240px, 38vh, 300px); 
            background: var(--bg-card-escuro);
            border-radius: 0px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            padding: 24px; 
            box-shadow: 0 12px 35px rgba(29,51,38,0.15); 
            margin-bottom: 24px; 
            flex-shrink: 0;
            transition: var(--transicao-suave);
        }
        .card-capa-dia img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; transition: transform 8s ease; }
        .card-capa-dia:hover img { transform: scale(1.05); }
        
        .capa-content { position: relative; z-index: 2; text-align: left; display: flex; flex-direction: column; align-items: flex-start; }
        .tag-data { font-size: 0.7rem; color: rgba(255,255,255,0.7); margin-bottom: 8px; font-weight: 500; text-transform: none; letter-spacing: 0; }
        .capa-titulo { font-size: 1.35rem; font-family: -apple-system, sans-serif; font-style: normal; font-weight: 700; margin-bottom: 16px; line-height: 1.3; color: var(--texto-reverso); text-shadow: none; text-align: left; }
        .btn-premium { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: var(--texto-reverso); padding: 10px 24px; font-size: 0.75rem; text-transform: none; letter-spacing: 0.5px; cursor: pointer; border-radius: 0px; font-weight: 600; box-shadow: none; }
        .btn-premium:hover { background: #ffffff; color: #11161d; }

        /* PROGRESSO SEMANAL REESTRUTURADO */
        .progresso-semanal-container { background: var(--bg-card); border: 1px solid var(--borda); padding: 20px 16px; border-radius: 0px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .progresso-header { display: flex; justify-content: space-between; font-size: 0.75rem; text-transform: none; letter-spacing: 0; color: var(--texto-puro); font-weight: 700; }
        .progresso-header span:last-child { color: var(--texto-mutado); }
        .progresso-barra-fundo { width: 100%; height: 6px; background: rgba(0,0,0,0.05); border-radius: 0px; overflow: hidden; }
        body.tema-escuro .progresso-barra-fundo { background: rgba(255,255,255,0.1); }
        .progresso-barra-ativa { height: 100%; width: 0%; background: var(--verde-marca); transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: none; }

        /* MENUS INFERIORES SIMPLES */
        .grid-menus { display: flex; flex-direction: column; gap: 10px; margin-bottom: auto; flex-shrink: 0; }
        .btn-menu-extra { 
            background: var(--bg-card); 
            border: 1px solid var(--borda); 
            border-radius: 0px; 
            padding: 16px 20px; 
            color: var(--texto-puro); 
            font-size: 0.85rem; 
            text-transform: none; 
            letter-spacing: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            font-weight: 600;
            transition: var(--transicao-suave); 
        }
        .btn-menu-extra:hover { background: rgba(46, 77, 58, 0.04); }

        /* BARRA DE NAVEGAÇÃO INFERIOR FIXA */
        .tab-bar-fixa {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 68px;
            background: var(--bg-principal);
            border-top: 1px solid var(--borda);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 10px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--texto-mutado);
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            height: 100%;
            justify-content: center;
            width: 80px;
            position: relative;
            transition: var(--transicao-suave);
        }
        .tab-item::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0%;
            height: 2px;
            background-color: var(--verde-marca);
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .tab-item.active::after { width: 70%; }
        .tab-item.active { color: var(--verde-marca); font-weight: 700; }
        .tab-item svg { width: 20px; height: 20px; fill: currentColor; }

        /* CONFIGURAÇÃO DA TELA DE LEITURA INTERNA */
        .navbar-leitura { 
            position: relative; 
            width: 100%; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 20px; 
            z-index: 10; 
            background: var(--bg-principal);
            border-bottom: 1px solid var(--borda);
        }
        .capa-leitura-topo { width: 100%; height: 240px; position: relative; overflow: hidden; }
        .capa-leitura-topo img { width: 100%; height: 100%; object-fit: cover; }
        .capa-leitura-topo::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-principal) 0%, rgba(0,0,0,0) 40%); }
        
        .barra-ferramentas-leitura { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: var(--bg-card); padding: 12px 16px; border-radius: 0px; border: 1px solid var(--borda); }
        .botoes-fonte { display: flex; gap: 6px; }
        .btn-fonte, .btn-theme-toggle, .btn-share { background: var(--bg-principal); border: 1px solid var(--borda); color: var(--texto-puro); padding: 8px 14px; font-size: 0.7rem; font-weight: 600; border-radius: 0px; cursor: pointer; transition: var(--transicao-suave); text-transform: none; }
        .btn-share { background: var(--verde-marca); color: var(--texto-reverso); border: none; }
        
        .card-leitura { background: transparent; padding: 0; margin-bottom: 30px; }
        .meta-leitura { font-size: 0.75rem; color: var(--texto-mutado); margin-bottom: 16px; text-transform: none; font-weight: 600; border-left: none; padding-left: 0; }
        .versiculo-texto { font-family: "Georgia", serif; font-size: 1.25rem; font-style: italic; line-height: 1.7; margin-bottom: 12px; color: var(--texto-puro); font-weight: 400; border-left: 3px solid var(--verde-marca); padding-left: 14px; }
        .versiculo-ref { font-size: 0.8rem; color: var(--texto-mutado); text-align: left; margin-bottom: 24px; font-weight: 600; }
        .texto-principal { color: var(--texto-puro); opacity: 0.9; line-height: 1.85; text-align: left; font-size: 1.05rem; letter-spacing: 0.2px; }
        .autor-texto { margin-top: 30px; font-size: 0.75rem; color: var(--texto-mutado); font-weight: 700; text-transform: uppercase; }

        /* FEED HISTÓRICO ATUALIZADO */
        .feed-lista { display: flex; flex-direction: column; gap: 12px; }
        .item-feed { display: flex; background: var(--bg-card); border: 1px solid var(--borda); border-radius: 0px; height: 85px; align-items: center; cursor: pointer; overflow: hidden; transition: var(--transicao-suave); }
        .item-feed img { width: 85px; height: 100%; object-fit: cover; opacity: 0.9; }
        .item-feed-body { flex: 1; padding: 14px; display: flex; flex-direction: column; justify-content: center; }
        .item-feed-data { font-size: 0.7rem; color: var(--texto-mutado); margin-bottom: 4px; font-weight: 500; }
        .item-feed-titulo { font-size: 0.95rem; font-weight: 700; color: var(--texto-puro); }
        .btn-ler-fino { background: var(--bg-principal); border: 1px solid var(--borda); color: var(--texto-puro); padding: 6px 14px; font-size: 0.7rem; font-weight: 600; cursor: pointer; margin-right: 14px; }
        .badge-lido { background: rgba(46, 77, 58, 0.1); color: var(--verde-marca); padding: 2px 6px; font-size: 0.6rem; font-weight: 700; margin-left: 6px; }

        /* INTERAÇÕES DE LEITURA */
        .box-interacoes { display: flex; justify-content: space-between; gap: 12px; margin-top: 40px; padding-top: 25px; border-top: 1px dashed var(--borda); }
        .btn-interagir { flex: 1; padding: 14px; border: 1px solid var(--borda); background: var(--bg-card); color: var(--texto-puro); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; transition: var(--transicao-suave); }
        .btn-interagir.ativo-favorito { background: #e63946; color: white; border-color: #e63946; }
        .btn-interagir.ativo-concluido { background: #4caf50; color: white; border-color: #4caf50; }

        /* RESPONSIVIDADE EM VISORES CURTOS */
        @media (max-height: 720px) {
            .view { padding-top: 14px !important; padding-bottom: 74px !important; }
            .saudacao-box { margin-bottom: 14px !important; }
            .card-capa-dia { height: 35vh !important; margin-bottom: 14px !important; }
            .progresso-semanal-container { margin-bottom: 14px !important; padding: 14px 16px !important; }
        }

        /* OUTROS COMPONENTES */
        #splash-screen { position: fixed; inset: 0; background: #1d3326; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .splash-logo { font-size: 1.2rem; letter-spacing: 4px; color: #ffffff; font-weight: 300; text-transform: uppercase; }
        .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(30px); background: var(--texto-puro); color: var(--bg-principal); padding: 12px 24px; font-size: 0.8rem; border-radius: 0px; z-index: 3000; opacity: 0; transition: var(--transicao-suave); pointer-events: none; font-weight: 600; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        footer { text-align: center; padding: 24px 0; font-size: 0.65rem; color: var(--texto-mutado); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-top: auto; }

        /* AJUSTE DO FEED HISTÓRICO COM BORDA DINÂMICA NO HOVER */
.item-feed { 
    display: flex; 
    background: var(--bg-card); 
    border: 1px solid var(--borda); 
    border-radius: 0px; 
    height: 85px; 
    align-items: center; 
    cursor: pointer; 
    overflow: hidden; 
    transition: var(--transicao-suave); 
    position: relative;
    /* Removemos o padding-left antigo para a borda fazer o papel do deslocamento */
    padding-left: 0px; 
}

/* INTERAÇÃO NO TEMA CLARO */
.item-feed:hover {
    background-color: rgba(46, 77, 58, 0.04); 
    border-color: var(--verde-marca); 
    /* Cria a tarja verde preenchendo o espaço de 6px */
    border-left: 6px solid var(--verde-marca); 
}

/* INTERAÇÃO NO TEMA ESCURO (AO CONTRÁRIO) */
body.tema-escuro .item-feed:hover {
    background-color: rgba(255, 255, 255, 0.03);
    border-color: var(--verde-marca);
    /* Cria a tarja com um tom creme/bege claro de destaque */
    border-left: 6px solid #f4eee1; 
}

.item-feed img { 
    width: 85px; 
    height: 100%; 
    object-fit: cover; 
    opacity: 0.9; 
    transition: var(--transicao-suave);
}

.item-feed:hover img {
    opacity: 1;
    transform: scale(1.02);
}
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">Presença Diária</div>
    </div>

    <div id="toast" class="toast">Ação concluída!</div>

    <div class="container">
        
        <!-- SIDEBAR MENU LATERAL -->
        <div id="sidebar-menu" class="sidebar">
            <div class="sidebar-header">
                <h3>Opções</h3>
                <button class="btn-close-sidebar" onclick="fecharMenuLateral()">✕</button>
            </div>
            <div class="sidebar-content">
                <button class="sidebar-link" onclick="mudarTela('view-home')">🏠 Início</button>
                <button class="sidebar-link" onclick="filtrarFeed('todos'); mudarTela('view-list')">📖 Biblioteca Completa</button>
                <button class="sidebar-link" onclick="filtrarFeed('favoritos'); mudarTela('view-list')">❤️ Meus Favoritos</button>
                <div class="sidebar-divider"></div>
                <!-- BOTÃO DE ALTERNAR TEMA DENTRO DO MENU SIDEBAR -->
                <button class="sidebar-link btn-txt-theme-toggle" onclick="alternarTemaGlobal()">🌙 Modo Escuro</button>
            </div>
        </div>

        <!-- VIEW PRINCIPAL (HOME) -->
        <div id="view-home" class="view">
            <div class="top-bar">
                <button class="btn-icon" onclick="abrirMenuLateral()">☰</button>
                <span style="font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--verde-marca)">Presença Diária</span>
                <!-- BOTÃO DE ALTERNAR TEMA DIRETO NO HEADER DA HOME -->
                <button class="btn-icon btn-header-theme-toggle" onclick="alternarTemaGlobal()">🌙</button>
            </div>
            
            <div class="saudacao-box">
                <span class="saudacao-texto" id="txt-saudacao-dinamica">Olá, Natanael</span>
                <span class="saudacao-sub">Que bom ter você aqui! Vamos juntos buscar a presença de Deus hoje.</span>
            </div>

            <div id="container-capa-hoje"></div>

            <div class="progresso-semanal-container">
                <div class="progresso-header">
                    <span>Progresso da semana</span>
                    <span id="txt-progresso-status">0% CONCLUÍDO</span>
                </div>
                <div class="progresso-barra-fundo">
                    <div class="progresso-barra-ativa" id="barra-progresso-dinamica"></div>
                </div>
            </div>
            
            <div class="grid-menus">
                <div class="btn-menu-extra" onclick="mudarTela('view-list')"><span>Ver Mensagens Anteriores</span><span class="icone">→</span></div>
            </div>
            <footer>Presença Diária</footer>
        </div>

        <!-- VIEW LISTA (HISTÓRICO) -->
        <div id="view-list" class="view">
            <div class="top-bar">
                <button class="btn-icon" onclick="mudarTela('view-home')">←</button>
                <h2 style="font-size: 1.2rem; font-weight: 700;">Biblioteca</h2>
                <div style="width:24px;"></div>
            </div>

            <div class="feed-lista" id="container-lista"></div>
            <footer>Presença Diária</footer>
        </div>

        <!-- VIEW LEITURA INTERNA -->
        <div id="view-read" class="view">
            <div class="navbar-leitura">
                <button class="btn-back" id="btn-voltar-dinamico" style="position:static; color:var(--texto-puro); transform:none;">←</button>
                <span class="nav-title">Devocional de hoje</span>
                <div style="width:24px;"></div>
            </div>
            <div class="capa-leitura-topo" id="capa-leitura-dinamica"></div>
            <div class="conteudo-leitura-padding">
                <div class="barra-ferramentas-leitura">
                    <div class="botoes-fonte">
                        <button class="btn-fonte" onclick="ajustarFonte(1)">A+</button>
                        <button class="btn-fonte" onclick="ajustarFonte(-1)">A-</button>
                    </div>
                    <!-- BOTÃO DE ALTERNAR TEMA DENTRO DA TELA DE LEITURA -->
                    <button class="btn-theme-toggle" onclick="alternarTemaGlobal()">🌙 Escuro</button>
                    <button class="btn-share" id="btn-share-devocional">Compartilhar</button>
                </div>

                <div id="container-leitura"></div>
                <footer>Presença Diária</footer>
            </div>
